<body>

  <script>
    // 외부 HTML로 쓸 때 Apps Script 웹 앱 /exec 주소를 넣으세요. 기존 배포를 계속 쓰면 이 주소를 유지해도 됩니다.
    const DATA_API_URL = 'https://script.google.com/macros/s/AKfycbyK9NBVbkOHNwxlZBFpH6_Ac2uUzS3uSemEw4DFZNeDlIpllSoYHaUIElCZCvflcJ1L/exec';
    const ZOOM_LINK = 'https://zoom.us/j/8518516175';
    const MATERIALS_LINK = 'https://works.do/G8gGaOS';
    const CHANNEL_ID = '353f2e81-81b9-2770-a190-1dd9cf19c1f4';
    const ALLERGY = '01. 난류, 02. 우유, 03. 메밀, 04. 땅콩, 05. 대두, 06. 밀, 07. 고등어, 08. 게, 09. 새우, 10. 돼지고기, 11. 복숭아, 12. 토마토, 13. 아황산류, 14. 호두, 15. 닭고기, 16. 쇠고기, 17. 오징어, 18. 조개류(굴, 전복, 홍합 포함), 19. 잣';

    const state = { schedule: [], meals: {}, groups: [], notices: [], selectedDate: '', calendarDate: '', track: localStorage.getItem('track') || '유초등', testNow: localStorage.getItem('testNow') || '', lastLoadedAt: '' };
    const modal = document.querySelector('#modal');

    const esc = (s='') => String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    const keyDate = (dt) => new Date(dt.getTime() - dt.getTimezoneOffset()*60000).toISOString().slice(0,10);
    const nowDate = () => state.testNow ? new Date(state.testNow) : new Date();
    const timeToNum = (t='') => { const [h,m] = String(t).split(':').map(Number); return (h||0)*60 + (m||0); };
    const norm = (s='') => String(s).replace(/\s+/g,'').trim();
    const shortPlace = (s='') => String(s).replace('충청남도교육청교육연수원 ','').replace('덕산 스플라스 리솜','스플라스 리솜').replace('Zoom 화상연수','Zoom');
    const scheduleDates = () => [...new Set(state.schedule.map(x=>x.date))].sort();
    const itemsByDate = (date) => state.schedule.filter(x => x.date === date && x.show !== 'N').sort((a,b)=>timeToNum(a.start)-timeToNum(b.start));
    const isBranchDate = (date) => itemsByDate(date).some(x => ['유초등','중등'].includes(x.audience));
    const filteredItems = (date) => itemsByDate(date).filter(x => !['유초등','중등'].includes(x.audience) || x.audience === state.track);

    function chooseInitialDate(){
      const today = keyDate(nowDate());
      const dates = scheduleDates();
      return dates.find(d => d >= today) || dates[0] || '2026-07-16';
    }

    function calendarFocusDate(){
      return keyDate(nowDate());
    }

    function statusOf(item){
      const n = nowDate(); const d = keyDate(n);
      if(item.date < d) return 'past';
      if(item.date > d) return 'future';
      const cur = n.getHours()*60 + n.getMinutes();
      const st = timeToNum(item.start), en = timeToNum(item.end);
      if(cur >= st && cur <= en) return 'now';
      if(cur > en) return 'past';
      return 'future';
    }

    function openModal(title, html){ document.querySelector('#modalTitle').textContent = title; document.querySelector('#modalBody').innerHTML = html; modal.showModal(); }
    function allergyHtml(){ return `<section class="allergy"><h4>알레르기 정보</h4><p>${ALLERGY}</p></section>`; }

    function renderDateChips(){
      const dates = scheduleDates();
      document.querySelector('#dateChips').innerHTML = dates.map(d=>{
        const it = state.schedule.find(x=>x.date===d);
        return `<button class="chip ${state.selectedDate===d?'active':''}" data-date="${d}">${it?.label || formatKDate(d)}</button>`;
      }).join('');
      document.querySelectorAll('[data-date]').forEach(b => b.onclick = () => { state.selectedDate = b.dataset.date; renderToday(); });
    }

    function formatKDate(d){ const [y,m,day] = d.split('-').map(Number); const yo = ['일','월','화','수','목','금','토'][new Date(y,m-1,day).getDay()]; return `${m}.${day}(${yo})`; }

    function renderBranchBox(id, date){
      const box = document.querySelector(id); const show = isBranchDate(date);
      box.classList.toggle('show', show);
      if(!show) return;
      box.innerHTML = `<span>${formatKDate(date)} 분반 선택</span><span class="branch-buttons"><button class="branch-btn ${state.track==='유초등'?'active':''}" data-track="유초등">유·초등</button><button class="branch-btn ${state.track==='중등'?'active':''}" data-track="중등">중등</button></span>`;
      box.querySelectorAll('[data-track]').forEach(btn => btn.onclick = () => { state.track = btn.dataset.track; localStorage.setItem('track', state.track); renderToday(); renderCalendarList(); });
    }

    function rowHtml(item, idx){
      const st = statusOf(item); const isMeal = item.type === '식사';
      const cls = `lesson ${isMeal?'meal':`tone${idx%5}`} ${st==='now'&&!isMeal?'now':''} ${st==='past'?'past':''}`;
      const tag = item.audience && item.audience !== '전체' ? `<span class="tag">${item.audience==='유초등'?'유·초등 분반':'중등 분반'}</span>` : '';
      return `<button class="${cls}" data-id="${item.id}"><span class="time"><b>${esc(item.start)}</b><i>~</i><b>${esc(item.end)}</b></span><span class="lesson-main"><span class="lesson-title">${st==='now'&&!isMeal?'<span class="now-badge">진행 중</span>':''}${tag}${esc(item.title)}</span><span class="lesson-place">${esc(shortPlace(item.location||''))}</span></span></button>`;
    }

    function renderToday(){
      if(!state.schedule.length){ document.querySelector('#todayList').innerHTML='<div class="empty">시간표 시트 내용을 불러오지 못했습니다.</div>'; return; }
      if(!state.selectedDate) state.selectedDate = chooseInitialDate();
      const today = keyDate(nowDate());
      document.querySelector('#statusText').textContent = state.selectedDate === today ? '오늘 시간표' : (state.selectedDate > today ? '다음 연수일' : '연수 일정');
      document.querySelector('#dayTitle').textContent = `${formatKDate(state.selectedDate)} 시간표`;
      renderDateChips(); renderBranchBox('#branchBox', state.selectedDate);
      const items = filteredItems(state.selectedDate);
      let count = 0;
      document.querySelector('#todayList').innerHTML = items.length ? items.map(it => rowHtml(it, it.type==='식사'?0:count++)).join('') : '<div class="empty">표시할 일정이 없습니다.</div>';
      const hours = items.filter(x=>x.type!=='식사').reduce((sum,x)=>sum + Math.max(0, timeToNum(x.end)-timeToNum(x.start))/50,0);
      document.querySelector('#hoursNote').innerHTML = `<b>${items.filter(x=>x.type!=='식사').length}개 일정</b> · 강의를 누르면 상세 내용을 볼 수 있어요.`;
    }

    function renderCalendar(){
      const cal = document.querySelector('#calendar');
      const dates = new Set(scheduleDates());
      const dows = ['일','월','화','수','목','금','토'];
      let html = dows.map((d,i)=>`<div class="dow ${i===0?'sun':''} ${i===6?'sat':''}">${d}</div>`).join('');
      const first = new Date(2026,6,1).getDay();
      for(let i=0;i<first;i++) html += '<button class="day empty"></button>';
      for(let day=1; day<=31; day++){
        const date = `2026-07-${String(day).padStart(2,'0')}`;
        const dow = new Date(2026,6,day).getDay();
        const has = dates.has(date); const tone = scheduleDates().indexOf(date)%5;
        const isFocusToday = date === calendarFocusDate();
        const selected = state.calendarDate === date;
        html += `<button class="day ${dow===0?'sun':''} ${dow===6?'sat':''} ${has?`has tone${tone}`:''} ${selected?'selected':''} ${isFocusToday?'today-dash':''}" ${has||selected?`data-cal="${date}"`:''}>${day}${has?'<span class="dot"></span>':''}</button>`;
      }
      cal.innerHTML = html;
      cal.querySelectorAll('[data-cal]').forEach(btn => btn.onclick = () => { state.calendarDate = btn.dataset.cal; state.selectedDate = state.calendarDate; renderCalendar(); renderCalendarList(); });
    }

    function renderCalendarList(){
      if(!state.calendarDate) state.calendarDate = calendarFocusDate();
      renderBranchBox('#allBranchBox', state.calendarDate);
      const items = filteredItems(state.calendarDate);
      let count = 0;
      const dateLabel = formatKDate(state.calendarDate);
      document.querySelector('#calendarList').innerHTML = `<div class="selected-date-label">${dateLabel}</div>` + (items.length ? items.map(it => rowHtml(it, it.type==='식사'?0:count++)).join('') : '<div class="empty">해당 날짜의 일정이 없습니다.</div>');
    }

    function findItem(id){ return state.schedule.find(x => String(x.id) === String(id)); }
    function groupsFor(key){ const k = norm(key); return state.groups.filter(g => norm(g.sequence) === k || norm(g.label).startsWith(k)); }
    function groupTable(key){
      const groups = groupsFor(key);
      if(!groups.length) return `<div class="empty">등록된 분임 장소가 없습니다.</div>`;
      return `<table class="table"><thead><tr><th>번호</th><th>강의실</th></tr></thead><tbody>${groups.map(g=>`<tr><td>${esc(g.number)}</td><td>${esc(g.room)}</td></tr>`).join('')}</tbody></table>`;
    }

    function showDetail(item){
      if(item.type === '식사'){ showMeal(item.date, item.title.includes('저녁')?'dinner':'lunch'); return; }
      const syllabus = String(item.syllabus||'').split(/\n+/).filter(Boolean).map(x=>`<li>${esc(x)}</li>`).join('');
      let group = '';
      if(item.type === '분임') group = `<h4>${esc(item.groupKey || item.title)} 장소</h4>${groupTable(item.groupKey || item.title)}`;
      openModal(`수업 상세`, `<span class="modal-label">${formatKDate(item.date)} · ${esc(item.start)} ~ ${esc(item.end)}</span><h3>${esc(item.title)}</h3><dl class="detail-grid"><div><dt>장소</dt><dd>${esc(item.location||'-')}</dd></div><div><dt>강사</dt><dd>${esc(item.speaker||'-')}</dd></div><div><dt>대상</dt><dd>${esc(item.audience||'전체')}</dd></div><div><dt>유형</dt><dd>${esc(item.type||'강의')}</dd></div></dl>${item.detail?`<p>${esc(item.detail)}</p>`:''}${syllabus?`<h4>교수요목</h4><ul>${syllabus}</ul>`:''}${group}${item.note?`<p class="empty">${esc(item.note)}</p>`:''}`);
    }

    function showMeal(date, mealType='lunch'){
      const menu = state.meals?.[date]?.[mealType] || [];
      const list = menu.length ? `<ul>${menu.map(m=>`<li>${esc(m)}</li>`).join('')}</ul>` : '<p>등록된 식단이 없습니다.</p>';
      openModal(`${formatKDate(date)} 식단`, `<span class="modal-label">식단 정보</span><h3>오늘의 식단</h3>${list}${allergyHtml()}`);
    }

    function renderGuide(){
      const guides = [['place','📍','연수 장소','주요 강의실과 분반 장소'],['duty','🧾','복무 안내','집합·현장체험·화상연수 출장처리'],['zoom','💻','화상연수 안내','7.28.(화) Zoom 접속'],['groups','🧩','분반·분임 안내','번호별 강의실 확인'],['materials','📄','연수 자료','안내문·과제·각종 자료'],['chat','💬','마주온 소통톡','공지와 자료 공유 확인']];
      document.querySelector('#guideList').innerHTML = guides.map(([k,i,t,s])=>`<button class="guide" data-guide="${k}"><span class="guide-icon">${i}</span><span><span class="guide-title">${t}</span><span class="guide-sub">${s}</span></span></button>`).join('');
      document.querySelectorAll('[data-guide]').forEach(b=>b.onclick=()=>showGuide(b.dataset.guide));
    }

    function showGroupGuide(defaultKey='분임토의 1'){
      const keys = ['분임토의 1','분임토의 2','분임토의 3','분임토의 4','분임토의 5'];
      const buttons = keys.map(k=>`<button data-gkey="${k}" class="${k===defaultKey?'active':''}">${k.replace('분임토의 ','분임 ')}</button>`).join('');
      openModal('분반·분임 안내', `<h3>분반·분임 장소</h3><div class="group-filter">${buttons}</div><div id="groupTableBox">${groupTable(defaultKey)}</div>`);
      document.querySelectorAll('[data-gkey]').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('[data-gkey]').forEach(x=>x.classList.remove('active'));btn.classList.add('active');document.querySelector('#groupTableBox').innerHTML=groupTable(btn.dataset.gkey);});
    }

    function showGuide(key){
      if(key==='groups') return showGroupGuide();
      if(key==='place') return openModal('연수 장소', `<span class="modal-label">장소 안내</span><h3>주요 장소</h3><ul><li><b>집합연수:</b> 충청남도교육청교육연수원 승지관 202호</li><li><b>7.20. 유·초등 분반:</b> 승지관 202호</li><li><b>7.20. 중등 분반:</b> 승지관 302호</li><li><b>현장체험:</b> 덕산 스플라스 리솜, 진로융합교육원</li><li><b>화상연수:</b> 자택 또는 근무지</li></ul>`);
      if(key==='duty') return openModal('복무 안내', `<h3>복무 안내</h3><section class="duty-card"><h4>집합연수</h4><p><b>해당 일자</b> · 7.16.(목)~7.20.(월), 7.23.(목)~7.27.(월), 7.29.(수)~7.30.(목)</p><p><b>복무</b> · 여비부지급 출장처리</p><p><b>출장지</b> · 충청남도교육청교육연수원</p><p><b>출장 목적</b> · 2026 교육전문직원 임용예정자 직무연수 참여</p></section><section class="duty-card"><h4>현장체험연수</h4><p><b>해당 일자</b> · 7.21.(화)~7.22.(수), 1박 2일</p><p><b>복무</b> · 여비부지급 출장처리</p><p><b>출장지</b> · 덕산 스플라스 리솜, 진로융합교육원</p><p><b>출장 목적</b> · 2026 교육전문직원 임용예정자 직무연수 참여</p></section><section class="duty-card"><h4>실시간 쌍방향 화상연수</h4><p><b>일시</b> · 7.28.(화) 09:00~17:00</p><p><b>복무</b> · 여비부지급 출장처리</p><p><b>출장지</b> · 자택 또는 소속기관</p><p><b>출장 목적</b> · 원격연수 참가</p></section>`);
      if(key==='zoom') return openModal('화상연수 안내', `<span class="modal-label">2026. 7. 28.(화)</span><h3>실시간 쌍방향 화상연수</h3><p><b>방법</b> · 줌(zoom) 접속 후 수강</p><p><b>Zoom ID</b> · 851 851 6175 / <b>비밀번호</b> · 1234</p><ul><li>수강 전 PC 또는 노트북에 Zoom을 설치합니다.</li><li>접속 시 참가자명을 반드시 OO중 이몽룡 형식으로 수정합니다.</li><li>연수 시간에 다른 일정과 중복되지 않도록 사전 조치합니다.</li><li>연수 중에는 상시 카메라를 켜야 출석 인정됩니다.</li></ul><a class="action" href="${ZOOM_LINK}" target="_blank" rel="noopener">Zoom 수업 입장 ↗</a><a class="action" style="background:#f2f7ff;color:#146be8" href="https://www.zoom.com/ko" target="_blank" rel="noopener">Zoom 설치하기 ↗</a>`);
      if(key==='materials') return openModal('연수 자료', `<h3>연수 자료</h3><p>연수 안내문, 교육과정 안내, 과제 양식 등은 자료실에서 확인합니다.</p><a class="action" href="${MATERIALS_LINK}" target="_blank" rel="noopener">자료실 열기 ↗</a>`);
      if(key==='chat') { openModal('마주온 소통톡', `<h3>마주온 소통톡</h3><p>연수 안내, 자료 공유, 과제 공지 등을 수시로 확인하세요.</p><p class="empty"><b>채널 ID</b><br>${CHANNEL_ID}</p><button class="copy" id="copyChannel">채널 ID 복사</button>`); document.querySelector('#copyChannel').onclick=()=>{navigator.clipboard?.writeText(CHANNEL_ID); document.querySelector('#copyChannel').textContent='복사했어요 ✓';}; }
    }

    function localDateValue(dt){ return keyDate(dt); }
    function localTimeValue(dt){ return `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`; }

    function showTestInput(){
      const cur = state.testNow ? new Date(state.testNow) : new Date();
      const curDate = localDateValue(cur);
      const curTime = localTimeValue(cur);
      openModal('날짜·시간 테스트', `<h3>임의 날짜/시간 설정</h3><p>진행 중·지난 일정 표시를 테스트할 수 있어요.</p><div class="test-inputs"><label>날짜<input id="testDate" type="date" value="${curDate}"></label><label>시간<input id="testTime" type="time" value="${curTime}" step="60"></label></div><button class="copy" id="saveTest">적용</button><button class="copy" id="clearTest">현재 시간으로 되돌리기</button>`);
      document.querySelector('#saveTest').onclick=()=>{
        const d=document.querySelector('#testDate').value;
        const t=document.querySelector('#testTime').value || '00:00';
        if(!d) return;
        state.testNow=`${d}T${t}:00`;
        localStorage.setItem('testNow',state.testNow);
        state.calendarDate=d;
        state.selectedDate=state.schedule.some(x=>x.date===d) ? d : chooseInitialDate();
        renderToday();
        renderCalendar();
        renderCalendarList();
        modal.close();
      };
      document.querySelector('#clearTest').onclick=()=>{
        state.testNow='';
        localStorage.removeItem('testNow');
        state.calendarDate=calendarFocusDate();
        state.selectedDate=chooseInitialDate();
        renderToday();
        renderCalendar();
        renderCalendarList();
        modal.close();
      };
    }

    function switchView(view){ document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden')); document.querySelector(`#${view}View`).classList.remove('hidden'); document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('active', b.dataset.view===view)); if(view==='all'){ if(!state.calendarDate) state.calendarDate = calendarFocusDate(); renderCalendar(); renderCalendarList(); } if(view==='guide') renderGuide(); window.scrollTo({top:0, behavior:'smooth'}); }

    function normalizeData(data){
      state.schedule = (data.schedule || []).map((x,i)=>({ id: x.id ?? i, date:x.date, label:x.label || formatKDate(x.date), start:x.start||'', end:x.end||'', title:x.title||'', location:x.location||'', speaker:x.speaker||'', audience:x.audience||'전체', type:x.type||'강의', detail:x.detail||'', syllabus:x.syllabus||'', groupKey:x.groupKey||'', note:x.note||'', show:x.show||'Y' })).filter(x=>x.date && x.start && x.end && x.title).sort((a,b)=> a.date.localeCompare(b.date) || timeToNum(a.start)-timeToNum(b.start));
      state.meals = data.meals || {}; state.groups = data.groups || []; state.notices = data.notices || [];
      state.lastLoadedAt = data.updatedAt || new Date().toLocaleString('ko-KR');
      if(!state.selectedDate || !state.schedule.some(x=>x.date===state.selectedDate)) state.selectedDate = chooseInitialDate();
      if(!state.calendarDate) state.calendarDate = calendarFocusDate();
      renderToday(); renderCalendar(); renderCalendarList(); renderGuide();
    }

    function loadData(){
      if(window.google && google.script && google.script.run){ google.script.run.withSuccessHandler(normalizeData).withFailureHandler(err=>{document.querySelector('#todayList').innerHTML=`<div class="empty">데이터를 불러오지 못했습니다.<br>${esc(err.message||err)}</div>`;}).getAppData(); return; }
      const cb = 'receiveTrainingData_' + Date.now();
      window[cb] = (data) => { normalizeData(data); delete window[cb]; script.remove(); };
      const script = document.createElement('script');
      script.onerror = () => { document.querySelector('#todayList').innerHTML='<div class="empty">Apps Script 데이터를 불러오지 못했습니다.<br>DATA_API_URL과 웹 앱 배포 권한을 확인해 주세요.</div>'; delete window[cb]; };
      script.src = DATA_API_URL + (DATA_API_URL.includes('?')?'&':'?') + 'callback=' + cb;
      document.body.appendChild(script);
    }

    document.addEventListener('click', e=>{ const row=e.target.closest('[data-id]'); if(row){ const item=findItem(row.dataset.id); if(item) showDetail(item); }});
    document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>switchView(b.dataset.view));
    document.querySelector('#mealBtn').onclick=()=>showMeal(state.selectedDate || chooseInitialDate());
    document.querySelector('#noticeBtn').onclick=()=>{
      const list = state.notices && state.notices.length
        ? `<ol class="notice-list">${state.notices.map(n=>`<li>${esc(n.text || n.content || n.notice || '')}</li>`).join('')}</ol>`
        : '<p>등록된 공지사항이 없습니다.</p>';
      const updated = state.lastLoadedAt ? `<p class="notice-updated">마지막 갱신: ${esc(state.lastLoadedAt)}</p>` : '';
      openModal('공지사항', `<span class="modal-label">시트 연동</span><h3>공지사항</h3>${list}${updated}`);
    };
    document.querySelector('#statusText').onclick=showTestInput;
    document.querySelector('#modalClose').onclick=()=>modal.close(); modal.addEventListener('click',e=>{if(e.target===modal)modal.close();});
    renderGuide(); loadData();
    setInterval(loadData, 10 * 60 * 1000);
    setInterval(()=>{ renderToday(); if(!document.querySelector('#allView').classList.contains('hidden')){ renderCalendar(); renderCalendarList(); } }, 60 * 1000);
  </script>
</body>
</html>
