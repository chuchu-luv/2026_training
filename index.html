    function switchView(v){document.querySelectorAll('.view').forEach(el=>el.hidden=el.id!==v+'View');document.querySelectorAll('[data-view]').forEach(el=>el.classList.toggle('active',el.dataset.view===v));if(v==='all')renderAll();if(v==='guide')renderGuide();window.scrollTo({top:0,behavior:'smooth'})}
    // 식단·분임토의 시트용 Apps Script 웹 앱 주소
    const DATA_API_URL = 'https://script.google.com/macros/s/AKfycbyK9NBVbkOHNwxlZBFpH6_Ac2uUzS3uSemEw4DFZNeDlIpllSoYHaUIElCZCvflcJ1L/exec';

    // 외부 index.html에서도 동작하도록 JSONP 방식으로 시트 데이터를 불러옵니다.
    function receiveTrainingData(data){
      window.__trainingDataLoaded=true;
      state.meals=data?.meals||{};
      state.groups=data?.groups||[];
      const n=document.querySelector('#sheetStatus');if(n)n.textContent='';
      renderToday();
      renderAll();
      renderGuide();
    }

    function loadData(){
      const old=document.querySelector('#trainingDataJsonp');
      if(old) old.remove();
      const script=document.createElement('script');
      script.id='trainingDataJsonp';
      script.src=`${DATA_API_URL}?callback=receiveTrainingData&_=${Date.now()}`;
      script.onerror=()=>{console.warn('시트 데이터를 불러오지 못했습니다. Apps Script 배포 권한과 /exec 주소를 확인하세요.');const n=document.querySelector('#sheetStatus');if(n)n.textContent='시트 연결에 실패했습니다. 식단·분임 정보는 잠시 후 다시 확인해 주세요.'};
      setTimeout(()=>{if(!window.__trainingDataLoaded){const n=document.querySelector('#sheetStatus');if(n)n.textContent='시트 연결을 확인 중입니다. 잠시 후 다시 열어 보세요.'}},7000);
      document.head.appendChild(script);
    }
    document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>switchView(b.dataset.view));document.querySelector('#mealButton').onclick=()=>showMeal();document.querySelector('#noticeButton').onclick=showNotices;document.querySelector('#statusText').onclick=openTestTime;document.querySelector('#modalClose').onclick=()=>modal.close();document.addEventListener('click',e=>{const row=e.target.closest('[data-row]');if(row){const [date,index]=row.dataset.row.split('|');showLesson(date,Number(index))}});modal.addEventListener('click',e=>{if(e.target===modal)modal.close()});renderToday();renderAll();renderGuide();loadData();
  </script>
</body>
</html>
